<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베토벤 운명 교향곡 · 팀파니</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Jua&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --paper:#f7f2e4;
  --paper-dark:#ede4c8;
  --ink:#1a1000;
  --ink2:#3a2800;
  --gold:#b8860b;
  --gold2:#d4a820;
  --C:#c0392b;   /* C drum = red */
  --G:#1a5276;   /* G drum = blue */
  --C-l:#e74c3c;
  --G-l:#2980b9;
}

body{
  background:radial-gradient(ellipse at 50% 20%, #1a0f00 0%, #050300 100%);
  min-height:100vh;
  font-family:'Jua',sans-serif;
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* ══ TITLE SCREEN ══ */
#title-screen{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 35%, #1e1200 0%, #050200 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;gap:18px;padding:24px;
}
.title-ornament{color:var(--gold);font-size:28px;letter-spacing:12px;opacity:.7;}
#title-screen h1{
  font-family:'Crimson Pro',serif;
  font-size:48px;color:var(--paper);
  text-shadow:0 0 40px rgba(180,130,10,.5),0 3px 0 #3a2800;
  letter-spacing:4px;text-align:center;line-height:1.2;
}
#title-screen .subtitle{
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:20px;color:var(--gold2);
  letter-spacing:3px;
}
.score-preview{
  width:560px;background:var(--paper);
  border:2px solid var(--gold);border-radius:2px;
  padding:18px 22px;
  box-shadow:0 0 60px rgba(180,130,10,.2), inset 0 0 30px rgba(180,130,10,.05);
}
.score-preview h3{
  font-family:'Crimson Pro',serif;font-size:15px;
  color:var(--ink2);margin-bottom:10px;text-align:center;
  border-bottom:1px solid rgba(100,70,10,.2);padding-bottom:8px;
}
.drum-info{display:flex;gap:24px;justify-content:center;margin-top:8px;}
.drum-badge{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);}
.drum-dot{width:18px;height:12px;border-radius:50%;border:2px solid rgba(0,0,0,.2);}
.dot-C{background:var(--C);}
.dot-G{background:var(--G);}
.key-hint{font-size:13px;color:#888;text-align:center;margin-top:6px;}
.start-btn{
  font-family:'Jua',sans-serif;font-size:22px;
  background:linear-gradient(135deg,var(--gold2),#8b6008);
  color:#1a0a00;border:none;padding:14px 56px;border-radius:2px;
  cursor:pointer;letter-spacing:3px;
  box-shadow:0 4px 24px rgba(180,130,10,.4), inset 0 1px 0 rgba(255,255,255,.15);
  transition:all .15s;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(180,130,10,.5);}

/* ══ GAME LAYOUT ══ */
#game-wrap{
  position:relative;width:960px;
  display:flex;flex-direction:column;align-items:center;
  z-index:1;
}

/* HUD */
#hud{
  width:960px;display:flex;justify-content:space-between;align-items:center;
  padding:5px 18px 3px;
}
#score-display{font-size:22px;color:var(--gold2);text-shadow:0 0 10px rgba(200,150,10,.4);}
#center-hud{display:flex;flex-direction:column;align-items:center;gap:1px;}
#song-name{font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;color:#c8a86a;}
#movement-name{font-size:11px;color:#8a7050;letter-spacing:1px;}
#combo-display{font-size:17px;color:#e8c870;min-width:110px;text-align:right;}
#life-display{font-size:17px;}
#progress-bar-wrap{width:960px;height:3px;background:rgba(255,255,255,.07);margin-bottom:2px;}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),#c05020);width:0%;transition:width .15s;}

/* ══ SCORE SHEET ══ */
#score-panel{
  width:960px;
  background:var(--paper);
  border-top:3px solid #8a6010;
  border-bottom:3px solid #8a6010;
  border-left:2px solid #a07820;
  border-right:2px solid #a07820;
  position:relative;overflow:hidden;
}
#score-panel::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(90deg,rgba(160,120,40,.04) 0 1px,transparent 1px) 0 0 / 80px 100%,
    linear-gradient(0deg,rgba(160,120,40,.03) 0 1px,transparent 1px) 0 0 / 100% 20px;
}
#staff-canvas{display:block;width:960px;}

/* Cursor */
#cursor-wrap{position:absolute;top:0;bottom:0;pointer-events:none;z-index:10;}
#cursor-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(180,40,10,.7);box-shadow:0 0 10px rgba(200,50,10,.5);}
#cursor-glow{position:absolute;top:0;bottom:0;left:-14px;width:30px;background:linear-gradient(90deg,transparent,rgba(200,80,20,.08),transparent);}

/* Judgment */
.judgment{
  position:absolute;font-size:20px;font-family:'Jua',sans-serif;
  pointer-events:none;animation:jPop .65s forwards;z-index:25;
}
@keyframes jPop{
  0%{transform:scale(.3) translateY(0);opacity:1;}
  50%{transform:scale(1.15) translateY(-14px);opacity:1;}
  100%{transform:scale(1) translateY(-30px);opacity:0;}
}

/* ══ STAGE ══ */
#stage{
  width:960px;height:200px;position:relative;
  background:linear-gradient(180deg,#14100a 0%,#060400 100%);
  border-bottom:2px solid #3a2800;
  display:flex;align-items:flex-end;justify-content:center;
  overflow:hidden;
}
#splash-canvas{position:absolute;top:0;left:0;width:960px;height:200px;pointer-events:none;z-index:20;}
#stage-light{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:500px;height:100%;
  background:radial-gradient(ellipse at 50% 0%,rgba(80,60,20,.12),transparent 70%);
  pointer-events:none;
}

.drum-area{
  display:flex;align-items:flex-end;justify-content:center;
  gap:80px;padding-bottom:10px;z-index:10;position:relative;
}

/* Single drum (timpani view from front) */
.timpani{
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;user-select:none;position:relative;
  transition:transform .07s;
}
.timpani:active,.timpani.hit{transform:scale(.91) translateY(5px);}

@keyframes memVibrate{
  0%{transform:scaleX(1) scaleY(1);}
  10%{transform:scaleX(1.08) scaleY(.84);}
  25%{transform:scaleX(.94) scaleY(1.08);}
  45%{transform:scaleX(1.05) scaleY(.93);}
  65%{transform:scaleX(.97) scaleY(1.05);}
  100%{transform:scaleX(1) scaleY(1);}
}
.mem.vibrate{animation:memVibrate .5s ease-out;}
.timpani.glow-C .mem{filter:brightness(1.8) drop-shadow(0 0 20px var(--C-l));}
.timpani.glow-G .mem{filter:brightness(1.8) drop-shadow(0 0 20px var(--G-l));}

.mem{
  width:160px;height:66px;border-radius:50%;
  border:4px solid rgba(255,255,255,.25);
  transition:filter .12s;position:relative;z-index:2;
  transform-origin:center;
}
.mem-C{background:radial-gradient(ellipse at 32% 30%,#f19898,#a01818);}
.mem-G{background:radial-gradient(ellipse at 32% 30%,#88b8e8,#0e3d6a);}
.mem::after{
  content:'';position:absolute;top:7px;left:20px;right:20px;height:14px;
  background:rgba(255,255,255,.24);border-radius:50%;
}
/* Bowl body */
.bowl{
  width:130px;height:78px;
  border-radius:0 0 65px 65px;
  border:3px solid #1a1000;margin-top:-6px;
  position:relative;
}
.bowl-C{background:linear-gradient(180deg,#7a5c2a 0%,#3a2208 100%);}
.bowl-G{background:linear-gradient(180deg,#5a6a7a 0%,#1a2430 100%);}
.bowl::before{
  content:'';position:absolute;left:12px;right:12px;top:8px;bottom:12px;
  border-top:2px solid rgba(255,220,100,.12);
  border-radius:0 0 55px 55px;
}
/* Legs */
.legs{display:flex;justify-content:space-between;width:140px;margin-top:2px;}
.leg{
  width:8px;height:38px;
  background:linear-gradient(90deg,#bbb,#666);
  border-radius:4px;margin:0 16px;
}
/* Key label */
.drum-key-label{
  font-size:18px;color:rgba(255,255,255,.9);margin-top:6px;
  background:rgba(0,0,0,.6);padding:3px 14px;border-radius:4px;
  border:1px solid rgba(255,255,255,.15);letter-spacing:2px;
}
.drum-name{
  font-family:'Crimson Pro',serif;font-size:13px;
  color:rgba(255,255,255,.55);margin-top:2px;
  font-style:italic;letter-spacing:1px;
}

/* Drum ring ripples */
.drum-ring{position:absolute;border-radius:50%;top:0;left:0;border:2.5px solid;opacity:0;pointer-events:none;z-index:15;}
@keyframes ringExp{0%{transform:scale(.4);opacity:.95;}100%{transform:scale(3);opacity:0;}}

/* Bread character */
#bread-char{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  width:72px;z-index:12;
}
#bread-char.bounce{animation:bBounce .22s ease;}
@keyframes bBounce{
  0%{transform:translateX(-50%) scaleY(1);}
  25%{transform:translateX(-50%) scaleY(.78) scaleX(1.18);}
  65%{transform:translateX(-50%) scaleY(1.08);}
  100%{transform:translateX(-50%) scaleY(1);}
}

/* ══ RESULT ══ */
.overlay{
  position:fixed;inset:0;background:rgba(3,2,0,.93);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:250;gap:14px;
}
.overlay h1{
  font-family:'Crimson Pro',serif;font-size:48px;
  color:var(--gold2);text-shadow:0 0 30px rgba(180,130,10,.5);
  letter-spacing:4px;
}
.final-score{font-size:60px;color:var(--gold2);}
.result-stats{display:flex;gap:24px;font-size:17px;color:#c8b880;}
.btn{
  font-family:'Jua',sans-serif;font-size:19px;
  background:linear-gradient(135deg,var(--gold2),#8b6008);
  color:#1a0800;border:none;padding:12px 40px;border-radius:2px;
  cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(180,130,10,.35);
  transition:transform .1s;margin:4px;
}
.btn:hover{transform:translateY(-2px);}
.btn-sec{background:linear-gradient(135deg,#3a5080,#1a2a48);}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-ornament">✦  ✦  ✦</div>
  <h1>SYMPHONY No.5<br>in C MINOR</h1>
  <div class="subtitle">L. van Beethoven, Op.67 · Timpani in C &amp; G</div>

  <div class="score-preview">
    <h3>Timpani Part · 팀파니 파트</h3>
    <div class="drum-info">
      <div class="drum-badge"><div class="drum-dot dot-C"></div> C drum (낮은 C)</div>
      <div class="drum-badge"><div class="drum-dot dot-G"></div> G drum (낮은 G)</div>
    </div>
    <div class="key-hint" style="margin-top:12px;">
      <strong>F</strong> = C 팀파니 &nbsp;|&nbsp; <strong>J</strong> = G 팀파니<br>
      (마우스 클릭 또는 화면 터치도 가능)
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">▶ &nbsp;연주 시작</button>
  <div class="title-ornament" style="font-size:16px;">✦  ✦  ✦</div>
</div>

<!-- RESULT -->
<div class="overlay" id="result-screen" style="display:none;">
  <h1 id="result-title">연주 완료</h1>
  <div class="final-score" id="final-score">0</div>
  <div class="result-stats">
    <span>완벽: <span id="res-p" style="color:var(--gold2)">0</span></span>
    <span>좋음: <span id="res-g" style="color:#88ddaa">0</span></span>
    <span>놓침: <span id="res-m" style="color:#dd6666">0</span></span>
    <span>최고콤보: <span id="res-c" style="color:#aabbff">0</span></span>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn" onclick="restartGame()">🔄 다시 하기</button>
  </div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <div id="hud">
    <div id="score-display">점수: <span id="score">0</span></div>
    <div id="center-hud">
      <div id="song-name">Symphony No.5 in C Minor</div>
      <div id="movement-name">ALLEGRO CON BRIO</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;">
      <div id="life-display">❤️❤️❤️</div>
      <div id="combo-display"></div>
    </div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

  <!-- SHEET MUSIC -->
  <div id="score-panel">
    <canvas id="staff-canvas" width="960"></canvas>
    <div id="cursor-wrap">
      <div id="cursor-glow"></div>
      <div id="cursor-line"></div>
    </div>
  </div>

  <!-- STAGE -->
  <div id="stage">
    <div id="stage-light"></div>
    <canvas id="splash-canvas" width="960" height="200"></canvas>
    <div id="bread-char">
      <svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="40" cy="82" rx="20" ry="16" fill="#f4c47a"/>
        <rect x="22" y="70" width="36" height="20" rx="6" fill="#4a7fd4"/>
        <rect x="24" y="86" width="15" height="14" rx="3" fill="#f5d020"/>
        <rect x="41" y="86" width="15" height="14" rx="3" fill="#f5d020"/>
        <rect x="27" y="98" width="10" height="14" rx="3" fill="#f4c47a"/>
        <rect x="43" y="98" width="10" height="14" rx="3" fill="#f4c47a"/>
        <rect x="27" y="108" width="10" height="5" rx="2" fill="white"/>
        <rect x="43" y="108" width="10" height="5" rx="2" fill="white"/>
        <ellipse cx="32" cy="114" rx="8" ry="4" fill="#222"/>
        <ellipse cx="48" cy="114" rx="8" ry="4" fill="#222"/>
        <line x1="23" y1="78" x2="6" y2="90" stroke="#f4c47a" stroke-width="7" stroke-linecap="round"/>
        <line x1="57" y1="78" x2="74" y2="90" stroke="#f4c47a" stroke-width="7" stroke-linecap="round"/>
        <circle cx="5" cy="92" r="5" fill="#8a5520"/>
        <circle cx="75" cy="92" r="5" fill="#8a5520"/>
        <rect x="16" y="20" width="48" height="48" rx="10" fill="#f5f0e0"/>
        <rect x="54" y="20" width="10" height="48" rx="5" fill="#cc3333"/>
        <ellipse cx="40" cy="20" rx="24" ry="10" fill="#f5f0e0"/>
        <ellipse cx="32" cy="38" rx="7" ry="8" fill="#222"/>
        <ellipse cx="48" cy="38" rx="7" ry="8" fill="#222"/>
        <ellipse cx="30" cy="36" rx="2.5" ry="3" fill="white"/>
        <ellipse cx="46" cy="36" rx="2.5" ry="3" fill="white"/>
        <path d="M26 30 Q32 27 38 30" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M42 30 Q48 27 54 30" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M32 52 Q40 60 48 52" stroke="#333" stroke-width="2.5" fill="#cc6655" stroke-linecap="round"/>
        <ellipse cx="26" cy="46" rx="6" ry="4" fill="#ffaabb" opacity="0.5"/>
        <ellipse cx="54" cy="46" rx="6" ry="4" fill="#ffaabb" opacity="0.5"/>
      </svg>
    </div>
    <div class="drum-area">
      <!-- C Drum -->
      <div class="timpani" id="drum-C" onclick="hitDrum(0)">
        <div class="mem mem-C" id="mem-C"></div>
        <div class="bowl bowl-C"></div>
        <div class="legs"><div class="leg"></div><div class="leg"></div></div>
        <div class="drum-key-label">F</div>
        <div class="drum-name">Timpani C</div>
      </div>
      <!-- G Drum -->
      <div class="timpani" id="drum-G" onclick="hitDrum(1)">
        <div class="mem mem-G" id="mem-G"></div>
        <div class="bowl bowl-G"></div>
        <div class="legs"><div class="leg"></div><div class="leg"></div></div>
        <div class="drum-key-label">J</div>
        <div class="drum-name">Timpani G</div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  BEETHOVEN 5TH SYMPHONY – TIMPANI BEATMAP
//  Source: actual timpani part (C & G, Boosey & Hawkes H.& S. 6177)
//
//  Two drums:  drum=0 → C (low C),  drum=1 → G (low G)
//  BPM ≈ 108 (Allegro con brio quarter note)
//  Time signature: 2/4 for most, some 3/4 / 6/8 sections
//
//  This beatmap covers the 1st movement main themes as visible
//  in the uploaded score pages.
// ══════════════════════════════════════════════════════════════════

const BPM = 108;
const BEAT = 60 / BPM;           // seconds per quarter note
const H = BEAT * 2;              // half note
const Q = BEAT;                  // quarter note
const E = BEAT / 2;              // eighth note
const S = BEAT / 4;              // sixteenth note
const D_Q = BEAT * 1.5;         // dotted quarter

// Helper: generate run of notes at interval
function run(startT, drum, count, interval){
  const arr=[];
  for(let i=0;i<count;i++) arr.push({t:startT+i*interval, drum});
  return arr;
}

// ── MOVEMENT 1: Allegro con brio ──
// Opening motive: G G G Eb  (pickup + 3 hits on G then long rest)
// Main beats visible on score page 1 (uploaded image 6)
//
// Bar 1: 2/4  rest (pickup bar = 1 beat)
// Bars 1-6: famous motive, timpani silent initially
// Bars ~6-18: rest (18 bars rest shown on score)
// Bar ~19: p cresc entrance on C then G alternating

let beats = [];
let t = 0;

// ─── Opening motif (bar 1 pickup) ─────────────────
// Score shows "2/4", bar 1 = half-bar pickup rest, then:
// The famous "short short short long" on G first time
// First timpani entrance is actually after ~20 bars of rest

// Bars 1 (pickup): rest
t = 0;

// Bar 1 proper (after pickup): Beethoven bars – G G G G  (eighth notes)
// This is actually silent for timpani in the opening.
// According to the score page 1, timpani has:
// "2  [12 rest]  [cresc p]" then the C/G hits
// We place the first real entrance around bar 14 (≈ 12 bars rest after pickup)

// Section 1: opening orchestral tutti, timpani silent
// (about 26 beats of rest = ~13 bars of 2/4)

// First entrance: p cresc – gentle C then G
t = 26 * Q;

// p cresc section: alternating C / G quarter notes rising
beats.push(...[
  {t: t,            drum:0},  // C
  {t: t + Q,        drum:1},  // G
  {t: t + 2*Q,      drum:0},  // C
  {t: t + 3*Q,      drum:1},  // G
  {t: t + 4*Q,      drum:0},  // C
  {t: t + 5*Q,      drum:1},  // G
]);
t += 8*Q;

// Section ①: ff crash
// Score shows circled 1 = rehearsal mark 1
// Short-short-short-long pattern on C and G
// "dun dun dun DUUUN" in timpani
beats.push(...[
  {t: t,        drum:0},  // C 8th
  {t: t+E,      drum:0},  // C 8th
  {t: t+E+E,    drum:1},  // G quarter
  {t: t+E+E+Q,  drum:0},  // C 8th
  {t: t+E+E+Q+E,drum:0},  // C 8th
  {t: t+E+E+Q+2*E, drum:1}, // G quarter
]);
t += 6*Q;

// G eighth run (ff)
beats.push(...run(t, 1, 8, E));
t += 8*E;
beats.push(...run(t, 0, 4, E));
t += 4*E;
beats.push(...run(t, 1, 4, E));
t += 6*Q;

// Motive repeats: C–G–C–G quarter pairs (f)
for(let rep=0; rep<4; rep++){
  beats.push({t:t, drum:0}, {t:t+Q, drum:1});
  t += Q*4;
}

// 41 bar rest marker on score
t += 41*Q*0.5; // compressed for gameplay

// Section ② Rehearsal 2 – f section
beats.push(...[
  {t:t,      drum:0},
  {t:t+E,    drum:0},
  {t:t+2*E,  drum:1},
  {t:t+3*E,  drum:0},
  {t:t+4*E,  drum:0},
  {t:t+5*E,  drum:1},
]);
t += 4*Q;
beats.push(...run(t, 1, 6, E));
t += 4*Q;

// piú f section: alternating C/G eighth notes
beats.push(...[
  {t:t, drum:0},{t:t+E, drum:1},
  {t:t+2*E, drum:0},{t:t+3*E, drum:1},
  {t:t+4*E, drum:0},{t:t+5*E, drum:1},
  {t:t+6*E, drum:0},{t:t+7*E, drum:1},
]);
t += 6*Q;

// 32 bar rest then Rehearsal 3
t += 32*Q*0.4;

// Section ③ Rehearsal 3 – ff trills
// Score shows trill marks (tr~~~) on whole notes
// These become rapid 16th note bursts in game
beats.push(...run(t, 0, 16, S));  // C trill
t += 2*Q;
beats.push(...run(t, 1, 16, S));  // G trill
t += 2*Q;

// Mix C and G
beats.push({t:t,drum:0},{t:t+E,drum:1},{t:t+Q,drum:0},{t:t+Q+E,drum:1});
t += 2*Q;
beats.push(...run(t, 0, 6, E));
t += 4*Q;

// Section ④ Rehearsal 4 – ff (score page 1 bottom)
// Long eighth note pattern visible: 十 十 十 十 etc.
beats.push(...run(t, 1, 12, E));
t += 6*Q;
beats.push(...run(t, 0, 8, E));
t += 4*Q;

// C and G interleaved
for(let i=0;i<8;i++){
  beats.push({t:t+i*E, drum: i%2===0 ? 0 : 1});
}
t += 6*Q;

// Solo passages (score shows "Solo.")
// Soft C–G–C quarter notes
beats.push(
  {t:t, drum:0},
  {t:t+Q, drum:1},
  {t:t+2*Q, drum:0},
  {t:t+3*Q, drum:1}
);
t += 6*Q;

// Second solo passage
beats.push(
  {t:t, drum:1},
  {t:t+Q, drum:0},
  {t:t+2*Q, drum:1},
  {t:t+3*Q, drum:0}
);
t += 8*Q;

// ─── MOVEMENT 2 indicator on score page 2 ─────────
// (labelled "2" at top right of score page 1)
// Series of eighth pairs
beats.push(...[
  {t:t,drum:0},{t:t+E,drum:0},
  {t:t+Q,drum:1},{t:t+Q+E,drum:1},
  {t:t+2*Q,drum:0},{t:t+2*Q+E,drum:0},
  {t:t+3*Q,drum:1},{t:t+3*Q+E,drum:1},
]);
t += 6*Q;

// Sempre più Allegro section (page 1, line 3)
// Fast repeated notes on C and G alternating
beats.push(...run(t, 0, 4, E));
t += 2*Q;
beats.push(...run(t, 1, 4, E));
t += 2*Q;
beats.push(...run(t, 0, 2, Q));
t += 2*Q;
beats.push(...run(t, 1, 2, Q));
t += 2*Q;

// Presto section! Very fast
beats.push(...run(t, 0, 8, E*0.7));
t += 4*Q;
beats.push(...run(t, 1, 8, E*0.7));
t += 4*Q;
beats.push(...run(t, 0, 4, E*0.7));
beats.push(...run(t, 0, 4, E*0.7).map(n=>({...n, t:n.t+2*Q, drum:1})));
t += 4*Q;

// f sections (page 1 lines 4-5): repeating pattern of pairs
for(let rep=0;rep<6;rep++){
  beats.push({t:t, drum:0},{t:t+E, drum:1});
  t += Q + (rep%2===1 ? Q : 0);
}
t += 2*Q;

// ff long section (line 6, page 1)
beats.push(...run(t, 0, 16, E));
t += 8*Q;
beats.push(...run(t, 1, 16, E));
t += 8*Q;

// Interleaved run
for(let i=0;i<16;i++){
  beats.push({t:t+i*E, drum: i%2===0 ? 0 : 1});
}
t += 8*Q;

// sempre ff (page 1 line 8 – trill notation)
beats.push(...run(t, 0, 24, S));  // C trill
t += 3*Q;
beats.push(...run(t, 1, 24, S));  // G trill  
t += 3*Q;

// Long held notes then resumption
beats.push({t:t, drum:0});
t += 2*Q;
beats.push({t:t, drum:1});
t += 2*Q;
beats.push(...run(t, 0, 6, E));
t += 4*Q;
beats.push(...run(t, 1, 6, E));
t += 4*Q;

// Runs of quarter pairs to finish
for(let rep=0;rep<10;rep++){
  beats.push({t:t, drum: rep%2===0 ? 0 : 1});
  t += Q;
}
t += 4*Q;

// Page 2 material (lines 9-11) – closing runs
beats.push(...run(t, 0, 12, E));
t += 6*Q;
beats.push(...run(t, 1, 12, E));
t += 6*Q;

// Fast alternating
for(let i=0;i<20;i++){
  beats.push({t:t+i*E, drum: i%3===0 ? 0 : 1});
}
t += 12*Q;

// Final page cadence
beats.push(
  {t:t, drum:0},{t:t+E, drum:0},
  {t:t+Q, drum:1},{t:t+Q+E, drum:1},
  {t:t+2*Q, drum:0},{t:t+2*Q+E, drum:1},
  {t:t+3*Q, drum:0},
  {t:t+4*Q, drum:1},
  {t:t+5*Q, drum:0},
  {t:t+6*Q, drum:0},
  {t:t+7*Q, drum:1},
);
t += 10*Q;

const TOTAL_DURATION = t + 2;

// Sort by time
beats.sort((a,b)=>a.t-b.t);

//  CANVAS SETUP
// ══════════════════════════════════════════════════════════════════
const CW = 960;
const DRUM_ROWS = [
  { label:'C (low C)', color:'#c0392b', colorL:'#e74c3c', colorHex:'#c0392b' },
  { label:'G (low G)', color:'#1a5276', colorL:'#2980b9', colorHex:'#1a5276' },
];

const MARGIN_LEFT = 88;
const ROW_H       = 80;
const STAFF_OFF_Y = 40;  // staff line y within row
const CANVAS_H    = 20 + DRUM_ROWS.length * ROW_H + 10;
const CURSOR_X    = 240;
const SCROLL_SPD  = 200; // px/sec

const staffCanvas = document.getElementById('staff-canvas');
staffCanvas.height = CANVAS_H;
staffCanvas.style.height = CANVAS_H + 'px';
document.getElementById('score-panel').style.height = CANVAS_H + 'px';

const cw = document.getElementById('cursor-wrap');
cw.style.cssText = `position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;`;
const cursorLine = document.getElementById('cursor-line');
cursorLine.style.left = CURSOR_X + 'px';
cursorLine.style.height = CANVAS_H + 'px';
const cursorGlow = document.getElementById('cursor-glow');
cursorGlow.style.left = (CURSOR_X-14) + 'px';
cursorGlow.style.height = CANVAS_H + 'px';

const ctx = staffCanvas.getContext('2d');

function rowY(i){ return 20 + i * ROW_H + STAFF_OFF_Y; }

function drawStaticBg(){
  ctx.clearRect(0,0,CW,CANVAS_H);
  // Paper
  ctx.fillStyle = '#f2edd8';
  ctx.fillRect(0,0,CW,CANVAS_H);
  // Subtle warm gradient
  const grad = ctx.createLinearGradient(0,0,0,CANVAS_H);
  grad.addColorStop(0,'rgba(200,160,60,.04)');
  grad.addColorStop(1,'rgba(120,80,20,.06)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,CW,CANVAS_H);

  // Left label zone
  ctx.fillStyle = 'rgba(180,140,50,.07)';
  ctx.fillRect(0,0,MARGIN_LEFT,CANVAS_H);

  // Border lines
  ctx.fillStyle = '#8a6010';
  ctx.fillRect(0,0,CW,2);
  ctx.fillRect(0,CANVAS_H-2,CW,2);

  DRUM_ROWS.forEach((row, i)=>{
    const sy = rowY(i);

    // Row tint
    ctx.fillStyle = row.color + '0a';
    ctx.fillRect(MARGIN_LEFT, sy - ROW_H/2+4, CW - MARGIN_LEFT, ROW_H-8);

    // Row separator
    if(i>0){
      ctx.strokeStyle='rgba(100,70,10,.15)';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(4,sy-ROW_H/2+4);ctx.lineTo(CW-4,sy-ROW_H/2+4);ctx.stroke();
    }

    // Staff line (single line percussion staff)
    ctx.strokeStyle = '#2a1a04';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(MARGIN_LEFT, sy);
    ctx.lineTo(CW-4, sy);
    ctx.stroke();

    // Percussion clef (two rects)
    const cx = MARGIN_LEFT - 22;
    ctx.fillStyle = row.color;
    ctx.fillRect(cx-5, sy-14, 5, 28);
    ctx.fillRect(cx+2, sy-14, 5, 28);

    // Label
    ctx.font = 'bold 10px "Crimson Pro", serif';
    ctx.fillStyle = row.color;
    ctx.textAlign = 'right';
    ctx.fillText(row.label, MARGIN_LEFT - 12, sy + 4);

    // Drum indicator circle
    ctx.beginPath();
    ctx.arc(MARGIN_LEFT - 44, sy, 8, 0, Math.PI*2);
    ctx.fillStyle = row.color;
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();
  });

  // Bar lines every ~96px
  ctx.strokeStyle='rgba(60,40,10,.25)';
  ctx.lineWidth=1;
  const topY = rowY(0) - ROW_H/2 + 8;
  const botY = rowY(DRUM_ROWS.length-1) + ROW_H/2 - 8;
  for(let bx = MARGIN_LEFT + 96; bx < CW-10; bx+=96){
    ctx.beginPath();ctx.moveTo(bx,topY);ctx.lineTo(bx,botY);ctx.stroke();
  }

  // Cursor zone
  ctx.fillStyle='rgba(180,50,10,.05)';
  ctx.fillRect(CURSOR_X-20,0,40,CANVAS_H);

  // Labels C / G near cursor
  DRUM_ROWS.forEach((row,i)=>{
    const sy=rowY(i);
    ctx.font='bold 9px "Jua",sans-serif';
    ctx.fillStyle=row.color+'aa';
    ctx.textAlign='center';
    ctx.fillText(['F','J'][i], CURSOR_X, sy+25);
  });

  ctx.textAlign='left';
}

// ── Note rendering ──
let scrollNotes = [];
let hitFlashes = [];

function drawFrame(){
  drawStaticBg();

  // Approaching glow behind cursor
  scrollNotes.forEach(n=>{
    if(n.hit||n.missed) return;
    const sx = rowY(n.drum);
    const dist = Math.abs(n.x - CURSOR_X);
    if(dist < 70){
      const a = (1-dist/70)*0.5;
      const row=DRUM_ROWS[n.drum];
      ctx.beginPath();
      ctx.arc(n.x, sx, 26, 0, Math.PI*2);
      ctx.fillStyle = row.colorL + Math.floor(a*255).toString(16).padStart(2,'0');
      ctx.fill();
    }
  });

  // Draw notes
  scrollNotes.forEach(n=>{
    if(n.hit) return;
    if(n.missed){
      if(!n.missA) n.missA=0.5;
      n.missA -= 0.04;
      if(n.missA<=0) return;
      const sy=rowY(n.drum);
      ctx.save();ctx.globalAlpha=n.missA;
      ctx.translate(n.x,sy);ctx.rotate(-0.2);
      ctx.beginPath();ctx.ellipse(0,0,12,9,0,0,Math.PI*2);
      ctx.fillStyle='#aaa';ctx.fill();
      ctx.restore();
      return;
    }
    const sy = rowY(n.drum);
    const row = DRUM_ROWS[n.drum];

    ctx.save();
    ctx.shadowColor = row.colorL;
    ctx.shadowBlur = 9;

    // Notehead
    ctx.save();
    ctx.translate(n.x, sy);
    ctx.rotate(-0.2);
    ctx.beginPath();
    ctx.ellipse(0,0,12,9,0,0,Math.PI*2);
    ctx.fillStyle = row.color;
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;ctx.stroke();
    // Shine
    ctx.beginPath();ctx.ellipse(-3,-3,4.5,3.2,-0.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.fill();
    ctx.restore();

    // Stem
    ctx.strokeStyle=row.color;ctx.lineWidth=2.2;
    ctx.beginPath();ctx.moveTo(n.x+11,sy-2);ctx.lineTo(n.x+11,sy-30);ctx.stroke();

    // Flag
    ctx.beginPath();
    ctx.moveTo(n.x+11,sy-30);
    ctx.bezierCurveTo(n.x+30,sy-22,n.x+26,sy-10,n.x+20,sy-8);
    ctx.lineWidth=2.2;ctx.strokeStyle=row.color;ctx.stroke();

    // Key badge
    ctx.beginPath();ctx.arc(n.x,sy+20,9,0,Math.PI*2);
    ctx.fillStyle=row.color;ctx.fill();
    ctx.font='bold 10px "Jua"';ctx.fillStyle='white';ctx.textAlign='center';
    ctx.fillText(['F','J'][n.drum], n.x, sy+24);
    ctx.textAlign='left';

    ctx.restore();
  });

  // Hit flashes on cursor
  hitFlashes.forEach(f=>{
    f.alpha -= 0.09;
    if(f.alpha<=0) return;
    const sy=rowY(f.drum);
    ctx.save();
    ctx.globalAlpha=f.alpha;
    ctx.beginPath();
    ctx.arc(CURSOR_X,sy,28+(1-f.alpha)*15,0,Math.PI*2);
    ctx.fillStyle=DRUM_ROWS[f.drum].colorL;
    ctx.fill();
    ctx.restore();
  });
  hitFlashes=hitFlashes.filter(f=>f.alpha>0);
}

//  SPLASH CANVAS
// ══════════════════════════════════════════════════════════════════
const splashCanvas=document.getElementById('splash-canvas');
const sc=splashCanvas.getContext('2d');
let splashP=[];
const DRUM_STAGE_X=[280, 580]; // stage x positions for C and G drums

function triggerSplash(drum){
  const cx=DRUM_STAGE_X[drum], cy=38;
  const hex=DRUM_ROWS[drum].colorHex;
  for(let r=0;r<3;r++) splashP.push({type:'ring',cx,cy,radius:8,maxR:110+r*35,alpha:.9,color:hex,speed:4.5+r*1.5,delay:r*50});
  splashP.push({type:'flash',cx,cy,radius:0,maxR:80,alpha:.8,color:hex,speed:7});
  for(let i=0;i<32;i++){
    const a=Math.random()*Math.PI*2,spd=2.5+Math.random()*7.5;
    splashP.push({type:'drop',x:cx+(Math.random()-.5)*20,y:cy+(Math.random()-.5)*7,
      vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2.5,gravity:.30,size:2+Math.random()*6.5,alpha:1,color:hex,tail:[]});
  }
  for(let i=0;i<14;i++){
    const sp=Math.PI+(i/14)*Math.PI,spd=4+Math.random()*5.5;
    splashP.push({type:'drop',x:cx+(Math.random()-.5)*14,y:cy,
      vx:Math.cos(sp)*spd*.65,vy:-spd,gravity:.33,size:3+Math.random()*5,alpha:1,color:hex,tail:[]});
  }
}

function drawSplash(){
  sc.clearRect(0,0,960,200);
  splashP=splashP.filter(p=>{
    if(p.delay>0){p.delay-=16;return true;}
    if(p.type==='ring'){
      p.radius+=p.speed;p.alpha-=.03;
      if(p.alpha<=0||p.radius>=p.maxR) return false;
      sc.beginPath();sc.ellipse(p.cx,p.cy,p.radius,p.radius*.38,0,0,Math.PI*2);
      sc.strokeStyle=p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0');
      sc.lineWidth=2.5;sc.stroke();return true;
    }
    if(p.type==='flash'){
      p.radius+=p.speed;p.alpha-=.1;
      if(p.alpha<=0||p.radius>=p.maxR) return false;
      const g=sc.createRadialGradient(p.cx,p.cy,0,p.cx,p.cy,p.radius);
      g.addColorStop(0,p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0'));
      g.addColorStop(1,'transparent');
      sc.beginPath();sc.ellipse(p.cx,p.cy,p.radius,p.radius*.42,0,0,Math.PI*2);
      sc.fillStyle=g;sc.fill();return true;
    }
    if(p.type==='drop'){
      p.tail.push({x:p.x,y:p.y});if(p.tail.length>5)p.tail.shift();
      p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.alpha-=.022;
      if(p.alpha<=0||p.y>210) return false;
      if(p.tail.length>1){
        sc.beginPath();sc.moveTo(p.tail[0].x,p.tail[0].y);
        p.tail.forEach(pt=>sc.lineTo(pt.x,pt.y));
        sc.strokeStyle=p.color+Math.floor(p.alpha*.45*255).toString(16).padStart(2,'0');
        sc.lineWidth=p.size*.45;sc.lineCap='round';sc.stroke();
      }
      sc.save();sc.translate(p.x,p.y);sc.rotate(Math.atan2(p.vy,p.vx)+Math.PI/2);
      sc.scale(1,1.55);sc.beginPath();sc.arc(0,0,p.size/2,0,Math.PI*2);sc.restore();
      sc.fillStyle=p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0');sc.fill();
      sc.beginPath();sc.arc(p.x-p.size*.22,p.y-p.size*.22,p.size*.2,0,Math.PI*2);
      sc.fillStyle=`rgba(255,255,255,${p.alpha*.55})`;sc.fill();
      return true;
    }
    return false;
  });
}

//  AUDIO – Realistic Timpani + Orchestra BG
// ══════════════════════════════════════════════════════════════════
let audioCtx=null, bgOscs=[];

function initAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}

function playTimpaniHit(drum){
  if(!audioCtx) return;
  const now=audioCtx.currentTime;
  // C drum ≈ 65 Hz fundamental, G drum ≈ 98 Hz
  const f0 = drum===0 ? 65.4 : 98.0;

  const master=audioCtx.createGain();master.gain.value=.95;master.connect(audioCtx.destination);
  const rev=audioCtx.createDelay(.12);rev.delayTime.value=.08;
  const revG=audioCtx.createGain();revG.gain.value=.35;rev.connect(revG);revG.connect(master);

  // Membrane modes (inharmonic series of timpani)
  const modes=[1.0,1.504,1.742,2.0,2.245,2.659];
  const vols=[1.0,.55,.38,.22,.13,.07];
  const decs=[2.2,1.4,1.0,.75,.5,.35];
  modes.forEach((m,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=f0*m;f.Q.value=10;
    o.type='sine';o.frequency.value=f0*m;
    o.connect(f);f.connect(g);g.connect(master);f.connect(rev);
    g.gain.setValueAtTime(vols[i]*.7,now);
    g.gain.exponentialRampToValueAtTime(.001,now+decs[i]);
    o.start(now);o.stop(now+decs[i]+.05);
  });

  // Attack noise burst
  const bLen=Math.floor(audioCtx.sampleRate*.06);
  const buf=audioCtx.createBuffer(1,bLen,audioCtx.sampleRate);
  const bd=buf.getChannelData(0);
  for(let i=0;i<bLen;i++) bd[i]=(Math.random()*2-1);
  const ns=audioCtx.createBufferSource();ns.buffer=buf;
  const nf=audioCtx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=f0*3;nf.Q.value=.8;
  const ng=audioCtx.createGain();ng.gain.setValueAtTime(1.0,now);ng.gain.exponentialRampToValueAtTime(.001,now+.055);
  ns.connect(nf);nf.connect(ng);ng.connect(master);ns.start(now);ns.stop(now+.065);

  // Body thud
  const to=audioCtx.createOscillator(),tg=audioCtx.createGain();
  to.type='sine';to.frequency.setValueAtTime(f0*.48,now);to.frequency.exponentialRampToValueAtTime(f0*.22,now+.2);
  tg.gain.setValueAtTime(.8,now);tg.gain.exponentialRampToValueAtTime(.001,now+.25);
  to.connect(tg);tg.connect(master);to.start(now);to.stop(now+.28);

  // Membrane ring-down
  const mo=audioCtx.createOscillator(),mg=audioCtx.createGain();
  mo.type='triangle';mo.frequency.setValueAtTime(f0*1.42,now);mo.frequency.exponentialRampToValueAtTime(f0*1.1,now+.1);
  mg.gain.setValueAtTime(.55,now);mg.gain.exponentialRampToValueAtTime(.001,now+1.4);
  mo.connect(mg);mg.connect(master);mg.connect(rev);mo.start(now);mo.stop(now+1.45);
}

// ── Background orchestra (full Beethoven 5th strings+winds) ──
// We synthesize the famous opening motif and main themes
function startOrchBg(){
  if(!audioCtx) return;
  bgOscs.forEach(o=>{try{o.stop();}catch(e){}});bgOscs=[];

  const now=audioCtx.currentTime;
  const mg=audioCtx.createGain();mg.gain.value=0.07;mg.connect(audioCtx.destination);
  const dl=audioCtx.createDelay(.4);dl.delayTime.value=.22;
  const dg=audioCtx.createGain();dg.gain.value=.3;dl.connect(dg);dg.connect(mg);

  // Famous motive: Eb-Eb-Eb-C (short short short LONG)
  // Violin section simulacrum using sawtooth + filter
  const motive=[
    [311.1,.3,1],  // Eb4 short
    [311.1,.3,1],
    [311.1,.3,1],
    [196.0,1.8,.9], // G3 long (actually Eb goes to C but we do G for drama)
    [0,.4,0],
    [277.2,.3,1],  // Eb4 second time
    [277.2,.3,1],
    [277.2,.3,1],
    [174.6,2.0,.9], // F3 long
    [0,.4,0],
    // Development material
    [261.6,.5,.8],[293.7,.5,.8],[329.6,.5,.8],[349.2,.5,.8],
    [392.0,1.0,1],[0,.3,0],
    [523.3,.25,.7],[493.9,.25,.7],[466.2,.25,.7],[440.0,.25,.7],
    [415.3,1.5,.9],[0,.5,0],
    // Main theme continuation
    [329.6,.3,.8],[329.6,.3,.8],[329.6,.3,.8],[261.6,1.5,.9],[0,.3,0],
    [293.7,.3,.8],[293.7,.3,.8],[293.7,.3,.8],[220.0,1.5,.9],[0,.5,0],
    // Bridge
    [392.0,.5,.9],[349.2,.5,.9],[329.6,.5,.9],[293.7,.5,.9],
    [261.6,2.0,1],[0,.5,0],
    [196.0,.25,.7],[220.0,.25,.7],[246.9,.25,.7],[261.6,.25,.7],
    [293.7,.5,.8],[329.6,.5,.8],[349.2,.5,.8],[392.0,.5,.8],
    [440.0,1.5,1],[0,.8,0],
  ];

  const beatSec = 60/108;
  let t=now+0.3;
  const loopDur=motive.reduce((s,n)=>s+n[1],0)*beatSec;

  for(let rep=0;rep<8;rep++){
    let tt=t+rep*loopDur;
    motive.forEach(n=>{
      const [freq,dur,vol]=n;const d=dur*beatSec;
      if(freq===0){tt+=d;return;}
      // Strings layer (sawtooth)
      const o=audioCtx.createOscillator(),g=audioCtx.createGain(),fi=audioCtx.createBiquadFilter();
      fi.type='lowpass';fi.frequency.value=700;o.type='sawtooth';o.frequency.value=freq;
      // Vibrato
      const vl=audioCtx.createOscillator(),vg=audioCtx.createGain();
      vl.frequency.value=5.5;vg.gain.value=2.5;vl.connect(vg);vg.connect(o.frequency);
      o.connect(fi);fi.connect(g);g.connect(mg);fi.connect(dl);
      g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(vol*.9,tt+.03);
      g.gain.setValueAtTime(vol*.9,tt+d*.8);g.gain.linearRampToValueAtTime(0,tt+d);
      o.start(tt);o.stop(tt+d+.04);vl.start(tt);vl.stop(tt+d+.04);
      bgOscs.push(o,vl);
      // Wind/horn layer (square, lower octave)
      const o2=audioCtx.createOscillator(),g2=audioCtx.createGain(),fi2=audioCtx.createBiquadFilter();
      fi2.type='lowpass';fi2.frequency.value=500;o2.type='square';o2.frequency.value=freq/2;
      o2.connect(fi2);fi2.connect(g2);g2.connect(mg);
      g2.gain.setValueAtTime(0,tt);g2.gain.linearRampToValueAtTime(vol*.3,tt+.06);
      g2.gain.setValueAtTime(vol*.3,tt+d*.7);g2.gain.linearRampToValueAtTime(0,tt+d);
      o2.start(tt);o2.stop(tt+d+.04);bgOscs.push(o2);
      tt+=d;
    });
  }
}

function stopBg(){ bgOscs.forEach(o=>{try{o.stop();}catch(e){}});bgOscs=[]; }

// ══════════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════════
const WIN_P=55, WIN_G=100;
let score=0,combo=0,maxCombo=0,life=3;
let perfectCnt=0,goodCnt=0,missCnt=0;
let gameRunning=false,lastTime=null,songTime=0;
let bmIndex=0,curBeatmap=[];
let nidCtr=0;

function startGame(){
  document.getElementById('title-screen').style.display='none';
  initAudio();
  beginGame();
}

function beginGame(){
  score=0;combo=0;maxCombo=0;life=3;
  perfectCnt=0;goodCnt=0;missCnt=0;
  songTime=0;bmIndex=0;scrollNotes=[];splashP=[];hitFlashes=[];
  curBeatmap=beats.map(n=>({...n,id:nidCtr++,hit:false,missed:false,x:0}));
  startOrchBg();
  updateHUD();lastTime=null;gameRunning=true;
  requestAnimationFrame(mainLoop);
}

function mainLoop(ts){
  if(!gameRunning) return;
  if(!lastTime) lastTime=ts;
  const dt=(ts-lastTime)/1000;lastTime=ts;songTime+=dt;
  document.getElementById('progress-bar').style.width=Math.min(100,songTime/TOTAL_DURATION*100)+'%';

  // Spawn notes
  while(bmIndex<curBeatmap.length){
    const n=curBeatmap[bmIndex];
    const spawnTime=n.t-(CW-CURSOR_X)/SCROLL_SPD;
    if(songTime>=spawnTime){ n.x=CURSOR_X+(n.t-songTime)*SCROLL_SPD; scrollNotes.push(n); bmIndex++; }
    else break;
  }

  // Update x
  scrollNotes.forEach(n=>{ n.x=CURSOR_X+(n.t-songTime)*SCROLL_SPD; });

  // Auto-miss
  scrollNotes.forEach(n=>{
    if(!n.hit&&!n.missed&&songTime>n.t+0.45){ n.missed=true; missNote(n); }
  });
  scrollNotes=scrollNotes.filter(n=>!(n.missed&&n.missA!==undefined&&n.missA<=0)&&n.x>-60);

  drawFrame();
  drawSplash();

  if(songTime>=TOTAL_DURATION&&scrollNotes.every(n=>n.hit||n.missed)&&bmIndex>=curBeatmap.length){
    endGame();return;
  }
  requestAnimationFrame(mainLoop);
}

function hitDrum(drum){
  if(!gameRunning) return;
  initAudio();
  playTimpaniHit(drum);
  drumVisual(drum);
  bounceBread();

  let best=null,bestD=Infinity;
  scrollNotes.forEach(n=>{
    if(n.drum!==drum||n.hit||n.missed) return;
    const d=Math.abs(n.x-CURSOR_X);
    if(d<bestD){bestD=d;best=n;}
  });
  if(best&&bestD<=WIN_G){
    best.hit=true;
    hitFlashes.push({drum,alpha:.85});
    triggerSplash(drum);
    if(bestD<=WIN_P){
      score+=300+combo*4;combo++;perfectCnt++;
      showJudge('완벽! ✨',best.drum,'#b8860b');
    } else {
      score+=100+combo;combo++;goodCnt++;
      showJudge('좋음! 👍',best.drum,'#1a7a30');
    }
    if(combo>maxCombo) maxCombo=combo;
  }
  updateHUD();
}

function missNote(n){
  n.missA=0.5;
  combo=0;missCnt++;life--;
  showJudge('놓침 💨',n.drum,'#c0392b');
  updateHUD();
  if(life<=0) endGame();
}

function updateHUD(){
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('combo-display').textContent=combo>=4?`🔥 ${combo} 콤보`:'';
  document.getElementById('life-display').textContent='❤️'.repeat(Math.max(0,life))+'🖤'.repeat(Math.max(0,3-life));
}

function showJudge(txt,drum,color){
  const el=document.createElement('div');
  el.className='judgment';el.textContent=txt;el.style.color=color;
  const sy=rowY(drum);
  el.style.cssText+=`;left:${CURSOR_X-20}px;top:${sy-35}px;z-index:30;`;
  document.getElementById('score-panel').appendChild(el);
  setTimeout(()=>el.remove(),700);
}

function drumVisual(drum){
  const id=['C','G'][drum];
  const mem=document.getElementById(`mem-${id}`);
  const drm=document.getElementById(`drum-${id}`);
  drm.classList.add('hit',`glow-${id}`);
  mem.classList.remove('vibrate');void mem.offsetWidth;mem.classList.add('vibrate');

  // Concentric rings
  const colors=[DRUM_ROWS[drum].colorHex,'#ffffff'];
  colors.forEach((rc,ri)=>{
    const ring=document.createElement('div');ring.className='drum-ring';
    ring.style.cssText=`border-color:${rc};width:160px;height:66px;animation:ringExp ${.5+ri*.12}s ${ri*.07}s ease-out forwards;`;
    mem.appendChild(ring);setTimeout(()=>ring.remove(),750+ri*120);
  });
  setTimeout(()=>{drm.classList.remove('hit',`glow-${id}`);mem.classList.remove('vibrate');},550);
}

function bounceBread(){
  const b=document.getElementById('bread-char');
  b.classList.remove('bounce');void b.offsetWidth;b.classList.add('bounce');
}

function endGame(){
  gameRunning=false;stopBg();
  document.getElementById('result-screen').style.display='flex';
  document.getElementById('final-score').textContent=score.toLocaleString();
  document.getElementById('res-p').textContent=perfectCnt;
  document.getElementById('res-g').textContent=goodCnt;
  document.getElementById('res-m').textContent=missCnt;
  document.getElementById('res-c').textContent=maxCombo;
  const total=perfectCnt+goodCnt+missCnt;
  const acc=total>0?Math.round((perfectCnt+goodCnt)/total*100):0;
  document.getElementById('result-title').textContent=
    acc>=95?'🏆 마에스트로!':acc>=80?'🎉 Bravo!':acc>=60?'👏 잘했어요!':'💪 다시 도전!';
}

function restartGame(){
  document.getElementById('result-screen').style.display='none';
  initAudio();beginGame();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!e.repeat){
    if(e.key.toLowerCase()==='f') hitDrum(0);
    if(e.key.toLowerCase()==='j') hitDrum(1);
  }
});

// Start rendering loop even before game starts
(function bgRender(){drawSplash();requestAnimationFrame(bgRender);})();
</script>

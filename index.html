<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BIG CAT 수업 캘린더 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --paper:#FFFDF7;--ink:#1A1208;--muted:#8A7B6A;--line:#E8E0D0;--surf:#F5F0E8;
  --c1:#E85D26;--c2:#3B82C4;--c3:#2AA876;--c4:#C4960A;--c5:#8B4DB8;
  --red:#D94F3D;--green:#2AA876;--amber:#C4960A;
}
body{font-family:'Gowun Dodum',sans-serif;background:var(--paper);color:var(--ink);max-width:480px;margin:0 auto;padding-bottom:70px;}

/* NAV */
.bnav{display:flex;border-top:1px solid var(--line);background:var(--paper);padding:4px 0 8px;position:sticky;bottom:0;z-index:40;}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;padding:5px 2px;border:none;background:transparent;font-family:'Gowun Dodum',sans-serif;}
.bi-ic{font-size:20px;}
.bi-lb{font-size:9px;color:var(--muted);}
.bi.on .bi-lb{color:var(--c2);font-weight:500;}
.bi-link{text-decoration:none;}
.bi-link .bi-lb{color:var(--muted);}
.bi-link:hover .bi-lb{color:var(--ink);}

/* PAGES */
.pg{display:none;padding:12px;}
.pg.on{display:block;}

/* HEADER */
.ph{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-top:4px;}
.ph h1{font-family:'Black Han Sans',sans-serif;font-size:20px;flex:1;}
.ph-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.nav-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-top:4px;}
.nav-row h2{font-family:'Black Han Sans',sans-serif;font-size:17px;flex:1;text-align:center;}

/* BUTTONS */
.btn-pri{width:100%;padding:13px;background:var(--ink);color:var(--paper);border:none;border-radius:10px;font-family:'Black Han Sans',sans-serif;font-size:15px;cursor:pointer;letter-spacing:.5px;margin-top:6px;}
.btn-sm{padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;color:var(--ink);}
.btn-add{width:100%;padding:10px;border:1px dashed var(--line);border-radius:8px;background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:8px;}
.btn-del{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* CARDS */
.card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
.card-title{font-size:12px;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;}

/* FIELDS */
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-family:'Gowun Dodum',sans-serif;font-size:14px;background:var(--paper);color:var(--ink);outline:none;}
.field input:focus,.field textarea:focus{border-color:var(--c2);}
.field textarea{resize:vertical;min-height:60px;}
.inline-input{border:none;border-bottom:1px dashed var(--line);background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:14px;outline:none;color:var(--ink);padding:2px 4px;}

/* DAY PILLS */
.dpills{display:flex;gap:4px;flex-wrap:wrap;}
.dp{width:33px;height:33px;border-radius:50%;border:1px solid var(--line);background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:12px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.dp.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.dp[data-d="0"].on{background:var(--red);border-color:var(--red);}
.dp[data-d="6"].on{background:var(--c2);border-color:var(--c2);}

/* COLOR DOTS */
.cdots{display:flex;gap:5px;flex-wrap:wrap;}
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.cdot.on{border-color:var(--ink);transform:scale(1.15);}

/* WON CARD */
.won-card{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.won-header{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--surf);}
.won-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.won-title-input{flex:1;font-size:15px;font-weight:500;font-family:'Gowun Dodum',sans-serif;border:none;background:transparent;outline:none;color:var(--ink);}
.won-body{padding:12px 14px;}
.won-fields-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}

/* CLASS GROUPS (반) */
.class-list{margin-top:8px;}
.class-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--line);}
.class-row:last-child{border-bottom:none;}
.class-badge{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:500;flex-shrink:0;}
.class-input{flex:1;font-size:13px;font-family:'Gowun Dodum',sans-serif;border:none;border-bottom:1px dashed var(--line);background:transparent;outline:none;color:var(--ink);padding:1px 3px;}

/* WEEK */
.week-strip{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;margin-bottom:4px;}
.wday{flex:0 0 calc(100%/7 - 3px);min-width:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--paper);}
.wday.today{border:2px solid var(--ink);}
.wday-hd{padding:4px 2px;text-align:center;font-size:11px;font-weight:500;background:var(--ink);color:var(--paper);}
.wday-hd.sun{background:var(--red);}
.wday-hd.sat{background:var(--c2);}
.wday-date{font-size:9px;opacity:.65;}
.wday-body{padding:3px 2px;min-height:55px;}
.lchip{padding:3px 4px;border-radius:5px;margin-bottom:2px;font-size:9px;border-left:2px solid transparent;background:var(--surf);cursor:pointer;user-select:none;}
.lchip-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lchip-meta{color:var(--muted);font-size:8px;}
.wday-plus{text-align:center;font-size:16px;color:var(--muted);padding:2px;cursor:pointer;}

/* MONTH */
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.dow-hdr span{text-align:center;font-size:11px;color:var(--muted);padding:3px 0;}
.dow-hdr span:first-child{color:var(--red);}
.dow-hdr span:last-child{color:var(--c2);}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mcell{min-height:52px;border:0.5px solid var(--line);border-radius:5px;padding:3px 2px;background:var(--paper);position:relative;}
.mcell.other{opacity:.22;}
.mcell.today{border:1.5px solid var(--ink);}
.mdate{font-size:10px;font-weight:500;color:var(--muted);margin-bottom:2px;}
.mdate.sun{color:var(--red);}
.mdate.sat{color:var(--c2);}
.mchip{display:block;padding:2px 3px;border-radius:3px;font-size:8px;margin-bottom:1px;border-left:2px solid transparent;background:var(--surf);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;user-select:none;}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sc{background:var(--surf);border-radius:8px;padding:11px;}
.sc-lb{font-size:11px;color:var(--muted);margin-bottom:3px;}
.sc-val{font-size:22px;font-weight:500;}
.sc-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.bar-lb{font-size:11px;min-width:64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-tr{flex:1;height:9px;background:var(--surf);border-radius:5px;overflow:hidden;}
.bar-fi{height:100%;border-radius:5px;}
.bar-ct{font-size:10px;color:var(--muted);min-width:22px;text-align:right;}
.mtabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:12px;}
.mtab{padding:5px 9px;border:0.5px solid var(--line);border-radius:16px;font-size:11px;cursor:pointer;background:var(--paper);color:var(--muted);font-family:'Gowun Dodum',sans-serif;}
.mtab.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* HISTORY */
.wsel-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.wsel{padding:6px 11px;border:0.5px solid var(--line);border-radius:16px;font-size:12px;cursor:pointer;background:var(--paper);color:var(--muted);font-family:'Gowun Dodum',sans-serif;border-left:3px solid transparent;}
.wsel.on{color:var(--ink);font-weight:500;}
.memo-row{display:flex;gap:6px;margin-bottom:10px;}
.memo-row input{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-family:'Gowun Dodum',sans-serif;font-size:13px;background:var(--paper);color:var(--ink);outline:none;}
.memo-row input:focus{border-color:var(--c2);}
.memo-row button{padding:9px 13px;background:var(--ink);color:var(--paper);border:none;border-radius:8px;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;}
.hist-item{border-left:3px solid var(--line);padding:8px 10px;margin-bottom:7px;background:var(--surf);border-radius:0 8px 8px 0;cursor:pointer;}
.hist-date{font-size:11px;color:var(--muted);margin-bottom:2px;}
.hist-topic{font-size:14px;font-weight:500;margin-bottom:2px;}
.hist-note{font-size:12px;color:var(--muted);}
.hist-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.htag{padding:2px 6px;border-radius:9px;font-size:9px;background:var(--paper);border:0.5px solid var(--line);}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;line-height:1.7;}

/* STATUS */
.sbadge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;margin-left:4px;}
.sbadge.done{background:#E1F5EE;color:#0F6E56;}
.sbadge.ready{background:#FAEEDA;color:#854F0B;}
.sbadge.cancel{background:#FCEBEB;color:#A32D2D;}

/* SYMBOLS */
.sym-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.sym-btn{padding:4px 7px;border:1px solid var(--line);border-radius:14px;background:transparent;font-size:14px;cursor:pointer;}
.sym-btn.on{border-color:var(--c1);background:#FFF0E8;}

/* ROUTINE */
.rtn-box{background:var(--surf);border-radius:8px;padding:10px;}
.rtn-item{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--line);}
.rtn-item:last-child{border-bottom:none;}
.rchk{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--line);background:var(--paper);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.rchk.done{background:var(--green);border-color:var(--green);color:#fff;}
.rchk-txt{font-size:13px;flex:1;}
.rchk-txt.done{text-decoration:line-through;color:var(--muted);}
.step-note-in{width:100%;border:none;border-bottom:1px dashed var(--line);background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:11px;color:var(--muted);outline:none;padding:2px 0;margin-top:2px;}

/* ── MODALS (in-flow overlay pattern) ── */
.overlay{display:none;min-height:600px;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}

/* DETAIL MODAL */
.detail-modal{background:var(--paper);border-radius:16px 16px 0 0;width:100%;padding:18px;max-height:86vh;overflow-y:auto;}
.modal-title{font-family:'Black Han Sans',sans-serif;font-size:18px;margin-bottom:2px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}
.status-btns{display:flex;gap:5px;margin-bottom:12px;}
.st-btn{padding:7px 13px;border:0.5px solid var(--line);border-radius:8px;background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;color:var(--muted);}
.st-btn.on.ready{background:#FAEEDA;color:#854F0B;border-color:#C4960A;}
.st-btn.on.done{background:#E1F5EE;color:#0F6E56;border-color:#2AA876;}
.st-btn.on.cancel{background:#FCEBEB;color:#A32D2D;border-color:#D94F3D;}
.mbtns{display:flex;gap:8px;margin-top:12px;}
.mb-close{padding:11px 18px;border:0.5px solid var(--line);border-radius:9px;background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;color:var(--muted);}
.mb-save{flex:1;padding:11px;background:var(--ink);color:var(--paper);border:none;border-radius:9px;font-family:'Gowun Dodum',sans-serif;font-size:14px;cursor:pointer;}

/* PREVIEW MODAL */
.preview-modal{background:var(--paper);border-radius:16px 16px 0 0;width:100%;padding:18px;}
.preview-won-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.prev-section{margin-bottom:10px;}
.prev-label{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px;}
.prev-val{font-size:14px;}
.step-preview-row{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:13px;}
.step-tick{width:16px;height:16px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.step-tick.done{background:var(--green);color:#fff;}
.step-tick.undone{background:var(--surf);border:1px solid var(--line);}
.prev-btns{display:flex;gap:7px;margin-top:14px;}
.prev-edit{flex:1;padding:11px;background:var(--ink);color:var(--paper);border:none;border-radius:9px;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;}
.prev-close{padding:11px 16px;border:0.5px solid var(--line);border-radius:9px;background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;color:var(--muted);}
</style>

  <div class="ph"><div><h1>🐱 원 설정</h1><div class="ph-sub">원과 반(연령)을 등록하세요</div></div></div>

</div>

<div class="pg" id="pg-stats">
  <div class="ph"><div><h1>📊 수업 통계</h1><div class="ph-sub">2026년 진도 현황</div></div></div>
  <div class="mtabs" id="stat-tabs"></div>
  <div class="stat-grid" id="stat-summary"></div>
  <div class="card"><div class="card-title">원별 수업 횟수</div><div id="stat-bars"></div></div>
  <div class="card"><div class="card-title">루틴 완료율</div><div id="stat-rtn"></div></div>
</div>

<div class="pg" id="pg-hist">
  <div class="ph"><div><h1>📝 학급 히스토리</h1><div class="ph-sub">원·반별 누적 수업 기록</div></div></div>
  <div class="wsel-row" id="wsel-row"></div>

  <div id="hist-list"></div>
</div>

</div>

  </div>
</div>

      </svg>
    </span>
    <span class="bi-lb">게임룰렛</span>
  </a>
</div>

<script>
/* ── DATA ── */
const DAYS=['일','월','화','수','목','금','토'];
const COLORS=['#E85D26','#3B82C4','#2AA876','#C4960A','#8B4DB8','#D94F3D','#0891B2','#BE185D'];
const SYMS=['📚','✏️','🎵','🎮','🎯','🌟','🏆','💡','🎨','📝','🎤','🌈','🦁','🐯','🐧','🌸','⚡','🔔'];
const SL={ready:'준비중',done:'완료',cancel:'취소'};

let wons=[], routines=[], lessons={}, memos={};
let weekOff=0, monIdx=new Date().getMonth(), statMon=new Date().getMonth();
let histWonId=null, histClassId=null;
let editKey=null, editWonId=null, editClassId=null;
let curSt='ready', stepChecks=[], stepNotes=[];
let prevKey=null, prevWonId=null;

/* ── DATE HELPERS ── */
// getSunday: returns the Sunday that starts the week `off` weeks from current week
function getSunday(off){
  const now=new Date();
  const dow=now.getDay(); // 0=Sun ... 6=Sat
  const sun=new Date(now);
  sun.setDate(now.getDate()-dow+off*7); // back to this week's Sunday
  sun.setHours(0,0,0,0);
  return sun;
}
function dk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayDk(){return dk(new Date());}

/* ── LESSON KEY ── includes classId ── */
// key format: YYYY-MM-DD_wonId_classId
function lkey(dateStr,wonId,classId){return `${dateStr}_${wonId}_${classId}`;}
function parseLkey(k){const p=k.split('_');return{date:p[0],wonId:parseInt(p[1]),classId:parseInt(p[2])};}

/* ── DEFAULTS ── */
function initDefaults(){
  wons=[
    {id:1,name:'햇살어린이집',days:[1,3],color:COLORS[0],
     classes:[{id:11,age:'6세',time:'10:00'},{id:12,age:'5세',time:'11:00'}]},
    {id:2,name:'별빛유치원',days:[2,4],color:COLORS[1],
     classes:[{id:21,age:'7세',time:'13:00'}]},
  ];
  routines=[{id:1,name:'기본 루틴',steps:['Greeting & Warm-up','Song / Chant','Story & Target Language','Activity / Game','Review & Goodbye']}];
  renderSetup();
}

/* ── SETUP ── */
function renderSetup(){
  document.getElementById('won-list').innerHTML=wons.map((w,wi)=>`
    <div class="won-card">
      <div class="won-header" style="border-bottom:1px solid ${w.color}30;">
        <div class="won-dot" style="background:${w.color}"></div>
        <input class="won-title-input" value="${w.name}" onchange="wons[${wi}].name=this.value" placeholder="원명" />
        <button class="btn-del" onclick="wons.splice(${wi},1);renderSetup()">×</button>
      </div>
      <div class="won-body">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">방문 요일</div>
        <div class="dpills" style="margin-bottom:10px;">
          ${DAYS.map((d,di)=>`<button class="dp${w.days.includes(di)?' on':''}" data-d="${di}" onclick="toggleDay(${wi},${di})">${d}</button>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:5px;">색상</div>
        <div class="cdots" style="margin-bottom:10px;">
          ${COLORS.map(c=>`<div class="cdot${w.color===c?' on':''}" style="background:${c}" onclick="wons[${wi}].color='${c}';renderSetup()"></div>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">반 / 연령 · 시간</div>
        <div class="class-list">
          ${(w.classes||[]).map((cl,ci)=>`
            <div class="class-row">
              <span class="class-badge" style="background:${w.color}20;color:${w.color}">${cl.age||'연령'}</span>
              <input class="class-input" value="${cl.age}" placeholder="예) 7세" onchange="wons[${wi}].classes[${ci}].age=this.value;renderSetup()" style="max-width:60px;" />
              <input class="class-input" value="${cl.time}" placeholder="10:00" onchange="wons[${wi}].classes[${ci}].time=this.value" style="max-width:60px;" />
              <button class="btn-del" style="width:22px;height:22px;font-size:13px;" onclick="wons[${wi}].classes.splice(${ci},1);renderSetup()">×</button>
            </div>`).join('')}
        </div>
        <button style="border:none;background:transparent;font-size:12px;color:var(--muted);cursor:pointer;margin-top:6px;padding:2px 0;" onclick="addClassToWon(${wi})">＋ 반 추가</button>
      </div>
    </div>`).join('');

  document.getElementById('routine-list').innerHTML=routines.map((r,ri)=>`
    <div class="card" style="margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:15px;">📋</span>
        <input class="inline-input" value="${r.name}" onchange="routines[${ri}].name=this.value" style="flex:1;font-size:14px;font-weight:500;" />
        <button class="btn-del" onclick="routines.splice(${ri},1);renderSetup()">×</button>
      </div>
      ${r.steps.map((s,si)=>`
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
          <div style="width:19px;height:19px;border-radius:50%;background:var(--ink);color:var(--paper);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${si+1}</div>
          <input class="inline-input" value="${s}" onchange="routines[${ri}].steps[${si}]=this.value" style="flex:1;font-size:13px;" />
          <button class="btn-del" style="width:20px;height:20px;font-size:12px;" onclick="routines[${ri}].steps.splice(${si},1);renderSetup()">×</button>
        </div>`).join('')}
      <button style="border:none;background:transparent;font-size:12px;color:var(--muted);cursor:pointer;padding:2px 0;margin-top:2px;" onclick="routines[${ri}].steps.push('새 단계');renderSetup()">＋ 단계 추가</button>
    </div>`).join('');
}

function toggleDay(wi,di){const i=wons[wi].days.indexOf(di);i===-1?wons[wi].days.push(di):wons[wi].days.splice(i,1);renderSetup();}
function addWon(){wons.push({id:Date.now(),name:'',days:[],color:COLORS[wons.length%COLORS.length],classes:[{id:Date.now()+1,age:'',time:''}]});renderSetup();}
function addClassToWon(wi){wons[wi].classes.push({id:Date.now(),age:'',time:''});renderSetup();}
function addRoutine(){routines.push({id:Date.now(),name:'새 루틴',steps:['Greeting','Activity','Review']});renderSetup();}
function saveAll(){renderWeekly();renderMonthly();renderStats();renderHistPage();nav('weekly');}

/* ── WEEKLY ── */
function renderWeekly(){
  const sun=getSunday(weekOff);
  // build 7 days starting from Sunday
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sun);d.setDate(sun.getDate()+i);return d;});
  document.getElementById('wtitle').textContent=`${days[0].getMonth()+1}/${days[0].getDate()} — ${days[6].getMonth()+1}/${days[6].getDate()}`;

  const strip=document.getElementById('wstrip');
  strip.innerHTML=days.map((d)=>{
    const dow=d.getDay(); // 0=Sun,1=Mon,...,6=Sat
    const hdCls=dow===0?'sun':dow===6?'sat':'';
    const key=dk(d);
    const isToday=key===todayDk();
    // get all classes for this day
    const chips=[];
    wons.filter(w=>w.days.includes(dow)).forEach(w=>{
      (w.classes||[]).forEach(cl=>{
        const k=lkey(key,w.id,cl.id);
        const l=lessons[k]||{};
        const stDot=l.status==='done'?'🟢':l.status==='cancel'?'🔴':'';
        chips.push(`<div class="lchip" style="border-left-color:${w.color};background:${w.color}18;"
          data-lk="${k}" data-wid="${w.id}" data-cid="${cl.id}"
          ontouchstart="startPress(this,'${k}','${w.id}','${cl.id}')"
          ontouchend="endPress()"
          ontouchmove="cancelPress()"
          onclick="handleTap(event,'${k}','${w.id}','${cl.id}')">
          <div class="lchip-name">${l.icon||'📚'} ${w.name}${stDot}</div>
          <div class="lchip-meta">${cl.age} · ${cl.time}</div>
          ${l.topic?`<div style="font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.topic}</div>`:''}
        </div>`);
      });
    });
    return `<div class="wday${isToday?' today':''}">
      <div class="wday-hd ${hdCls}">
        <div>${DAYS[dow]}</div>
        <div class="wday-date">${d.getMonth()+1}/${d.getDate()}</div>
      </div>
      <div class="wday-body">
        ${chips.join('')}
        <div class="wday-plus" onclick="openDetailNew('${key}')">+</div>
      </div>
    </div>`;
  }).join('');
}

/* ── MONTHLY ── */
function renderMonthly(){
  const year=2026, m=monIdx;
  document.getElementById('mtitle').textContent=`${m+1}월`;
  const first=new Date(year,m,1);
  const lastDate=new Date(year,m+1,0).getDate();
  const startDow=first.getDay(); // day of week of 1st (0=Sun)
  const cells=[];
  // fill leading empty cells
  for(let i=0;i<startDow;i++){const d=new Date(year,m,1-startDow+i);cells.push({d,other:true});}
  for(let d=1;d<=lastDate;d++)cells.push({d:new Date(year,m,d),other:false});
  while(cells.length%7!==0){const prev=cells[cells.length-1].d;const nd=new Date(prev);nd.setDate(prev.getDate()+1);cells.push({d:nd,other:true});}

  const ts=todayDk();
  document.getElementById('mgrid').innerHTML=cells.map(({d,other})=>{
    const dow=d.getDay(),key=dk(d),isT=key===ts;
    const dayChips=[];
    if(!other){
      wons.filter(w=>w.days.includes(dow)).forEach(w=>{
        (w.classes||[]).forEach(cl=>{
          const k=lkey(key,w.id,cl.id);
          const l=lessons[k]||{};
          dayChips.push(`<div class="mchip" style="border-left-color:${w.color};background:${w.color}18;"
            data-lk="${k}"
            ontouchstart="startPress(this,'${k}','${w.id}','${cl.id}')"
            ontouchend="endPress()"
            ontouchmove="cancelPress()"
            onclick="handleTap(event,'${k}','${w.id}','${cl.id}')">${l.icon||'📚'} ${w.name}</div>`);
        });
      });
    }
    return `<div class="mcell${other?' other':''}${isT?' today':''}">
      <div class="mdate${dow===0?' sun':dow===6?' sat':''}">${d.getDate()}</div>
      ${dayChips.join('')}
    </div>`;
  }).join('');
}
function prevMon(){if(monIdx>0){monIdx--;renderMonthly();}}
function nextMon(){if(monIdx<11){monIdx++;renderMonthly();}}

/* ── LONG PRESS ── */
let pressTimer=null, pressTarget=null;
function startPress(el,k,wid,cid){
  pressTarget={k,wid,cid};
  pressTimer=setTimeout(()=>{openPreview(k,wid,cid);pressTimer=null;},500);
}
function endPress(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}}
function cancelPress(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}}
function handleTap(e,k,wid,cid){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;openDetail(k,wid,cid);}else if(!document.getElementById('prev-overlay').classList.contains('open')){openDetail(k,wid,cid);}}

/* ── PREVIEW MODAL ── */
function openPreview(k,wid,cid){
  prevKey=k;prevWonId=wid;
  const{date}=parseLkey(k);
  const w=wons.find(x=>x.id===parseInt(wid));
  const cl=(w?.classes||[]).find(c=>c.id===parseInt(cid));
  const l=lessons[k]||{};
  const d=new Date(date);
  const r=routines[0];
  const sc=l.status||'ready';

  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
    <span style="font-size:22px;">${l.icon||'📚'}</span>
    <div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:17px;">${w?w.name:''} <span style="font-size:13px;font-weight:400;">${cl?cl.age:''}</span></div>
      <div style="font-size:12px;color:var(--muted);">${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]}) · ${cl?cl.time:''} <span class="sbadge ${sc}">${SL[sc]}</span></div>
    </div>
  </div>`;

  if(l.topic){html+=`<div class="prev-section"><div class="prev-label">수업 주제</div><div class="prev-val">${l.topic}</div></div>`;}

  if(r){
    html+=`<div class="prev-section"><div class="prev-label">루틴 체크</div>`;
    r.steps.forEach((s,i)=>{
      const done=l.checks&&l.checks[i];
      html+=`<div class="step-preview-row"><div class="step-tick ${done?'done':'undone'}">${done?'✓':''}</div><span style="${done?'text-decoration:line-through;color:var(--muted)':''}">${i+1}. ${s}</span></div>`;
    });
    const doneCount=(l.checks||[]).filter(Boolean).length;
    const pct=r.steps.length?Math.round(doneCount/r.steps.length*100):0;
    html+=`<div style="margin-top:6px;font-size:11px;color:var(--muted);">완료율 ${pct}% (${doneCount}/${r.steps.length})</div></div>`;
  }

  if(l.note){html+=`<div class="prev-section"><div class="prev-label">메모</div><div class="prev-val" style="font-size:13px;color:var(--muted);">${l.note}</div></div>`;}
  if(!l.topic&&!l.note&&!l.checks?.some(Boolean)){html+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0;">아직 기록이 없어요<br>수정하기를 눌러 입력하세요</div>`;}

  document.getElementById('prev-content').innerHTML=html;
  document.getElementById('prev-overlay').classList.add('open');
}
function closePrev(){document.getElementById('prev-overlay').classList.remove('open');}
function prevToEdit(){
  const{wid,cid}=parseLkey(prevKey);
  closePrev();
  setTimeout(()=>openDetail(prevKey,wid,cid),100);
}

/* ── DETAIL MODAL ── */
function openDetail(k,wid,cid){
  editKey=k;editWonId=parseInt(wid);editClassId=parseInt(cid);
  const{date}=parseLkey(k);
  const w=wons.find(x=>x.id===editWonId);
  const cl=(w?.classes||[]).find(c=>c.id===editClassId);
  const l=lessons[k]||{};
  const d=new Date(date);

  document.getElementById('dm-title').textContent=`${w?w.name:''} · ${cl?cl.age:''}`;
  document.getElementById('dm-sub').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]}) · ${cl?cl.time:''}`;
  document.getElementById('dm-syms').innerHTML=SYMS.map(s=>`<button class="sym-btn${(l.icon||'📚')===s?' on':''}" onclick="pickSym(this)">${s}</button>`).join('');
  document.getElementById('dm-topic').value=l.topic||'';
  document.getElementById('dm-note').value=l.note||'';
  curSt=l.status||'ready';
  document.querySelectorAll('#dm-status-btns .st-btn').forEach(b=>{b.className=`st-btn${b.dataset.s===curSt?' on '+curSt:''}`;});
  const r=routines[0];
  stepChecks=l.checks?[...l.checks]:(r?r.steps.map(()=>false):[]);
  stepNotes=l.stepNotes?[...l.stepNotes]:(r?r.steps.map(()=>''):[]);
  document.getElementById('dm-rtn').innerHTML=r?r.steps.map((s,i)=>`
    <div class="rtn-item">
      <div class="rchk${stepChecks[i]?' done':''}" onclick="toggleRchk(${i})" id="rc${i}">${stepChecks[i]?'✓':''}</div>
      <div style="flex:1;">
        <div class="rchk-txt${stepChecks[i]?' done':''}" id="rt${i}">${i+1}. ${s}</div>
        <input class="step-note-in" placeholder="메모..." value="${stepNotes[i]||''}" oninput="stepNotes[${i}]=this.value" />
      </div>
    </div>`).join(''):'<div style="color:var(--muted);font-size:12px;">설정에서 루틴을 추가하세요</div>';
  document.getElementById('detail-overlay').classList.add('open');
}
function openDetailNew(dateStr){
  if(!wons.length){alert('설정에서 원을 먼저 추가하세요!');return;}
  const w=wons[0];const cl=(w.classes||[])[0];
  if(!cl){alert('원에 반을 먼저 추가하세요!');return;}
  openDetail(lkey(dateStr,w.id,cl.id),w.id,cl.id);
}
function pickSym(btn){document.querySelectorAll('.sym-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function setSt(s){curSt=s;document.querySelectorAll('#dm-status-btns .st-btn').forEach(b=>{b.className=`st-btn${b.dataset.s===s?' on '+s:''}`;});}
function toggleRchk(i){
  stepChecks[i]=!stepChecks[i];
  const rc=document.getElementById(`rc${i}`),rt=document.getElementById(`rt${i}`);
  rc.className=`rchk${stepChecks[i]?' done':''}`;rc.textContent=stepChecks[i]?'✓':'';
  rt.className=`rchk-txt${stepChecks[i]?' done':''}`;
}
function saveLesson(){
  const s=document.querySelector('.sym-btn.on');
  lessons[editKey]={icon:s?s.textContent:'📚',topic:document.getElementById('dm-topic').value,note:document.getElementById('dm-note').value,status:curSt,checks:[...stepChecks],stepNotes:[...stepNotes]};
  closeDetail();renderWeekly();renderMonthly();renderStats();
  if(document.getElementById('pg-hist').classList.contains('on'))renderHistPage();
}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}

/* ── STATS ── */
function renderStats(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('stat-tabs').innerHTML=months.map((mn,i)=>`<button class="mtab${i===statMon?' on':''}" onclick="statMon=${i};renderStats()">${mn}</button>`).join('');
  const year=2026,m=statMon,dim=new Date(year,m+1,0).getDate();
  let total=0,done=0,can=0,rtnT=0,rtnD=0;
  const wonCnts={};wons.forEach(w=>wonCnts[w.id]=0);
  for(let d=1;d<=dim;d++){
    const date=new Date(year,m,d),dow=date.getDay();
    wons.filter(w=>w.days.includes(dow)).forEach(w=>{
      (w.classes||[]).forEach(cl=>{
        total++;
        const l=lessons[lkey(dk(date),w.id,cl.id)];
        if(l){wonCnts[w.id]=(wonCnts[w.id]||0)+1;if(l.status==='done')done++;if(l.status==='cancel')can++;if(l.checks)l.checks.forEach(c=>{rtnT++;if(c)rtnD++;});}
      });
    });
  }
  document.getElementById('stat-summary').innerHTML=`
    <div class="sc"><div class="sc-lb">이번달 예정</div><div class="sc-val">${total}</div><div class="sc-sub">회 수업</div></div>
    <div class="sc"><div class="sc-lb">완료 기록</div><div class="sc-val">${done}</div><div class="sc-sub">회</div></div>
    <div class="sc"><div class="sc-lb">취소</div><div class="sc-val">${can}</div><div class="sc-sub">회</div></div>
    <div class="sc"><div class="sc-lb">루틴 완료율</div><div class="sc-val">${rtnT?Math.round(rtnD/rtnT*100):0}%</div><div class="sc-sub">${rtnD}/${rtnT}</div></div>`;
  const mx=Math.max(1,...Object.values(wonCnts));
  document.getElementById('stat-bars').innerHTML=wons.map(w=>`
    <div class="bar-row">
      <div class="bar-lb">${w.name}</div>
      <div class="bar-tr"><div class="bar-fi" style="width:${Math.round((wonCnts[w.id]||0)/mx*100)}%;background:${w.color};"></div></div>
      <div class="bar-ct">${wonCnts[w.id]||0}</div>
    </div>`).join('')||'<div style="color:var(--muted);font-size:12px;">수업 기록을 입력하면 나타납니다</div>';
  const r=routines[0];
  if(r){
    const sd=Array(r.steps.length).fill(0),st=Array(r.steps.length).fill(0);
    for(let d=1;d<=dim;d++){const date=new Date(year,m,d),dow=date.getDay();wons.filter(w=>w.days.includes(dow)).forEach(w=>{(w.classes||[]).forEach(cl=>{const l=lessons[lkey(dk(date),w.id,cl.id)];if(l&&l.checks)l.checks.forEach((c,i)=>{st[i]++;if(c)sd[i]++;});});});}
    const mx2=Math.max(1,...st);
    document.getElementById('stat-rtn').innerHTML=r.steps.map((s,i)=>`
      <div class="bar-row">
        <div class="bar-lb">${i+1}. ${s.length>10?s.slice(0,10)+'…':s}</div>
        <div class="bar-tr"><div class="bar-fi" style="width:${Math.round((sd[i]||0)/mx2*100)}%;background:var(--c3);"></div></div>
        <div class="bar-ct">${st[i]?Math.round((sd[i]||0)/st[i]*100):0}%</div>
      </div>`).join('');
  }else{document.getElementById('stat-rtn').innerHTML='<div style="color:var(--muted);font-size:12px;">루틴을 설정하면 나타납니다</div>';}
}

/* ── HISTORY ── */
function renderHistPage(){
  if(!histWonId&&wons.length)histWonId=wons[0].id;
  // won selector
  document.getElementById('wsel-row').innerHTML=wons.map(w=>`
    <button class="wsel${histWonId===w.id?' on':''}" style="border-left-color:${w.color}" onclick="histWonId=${w.id};histClassId=null;renderHistPage()">${w.name}</button>`).join('');
  // class selector
  const w=wons.find(x=>x.id===histWonId);
  const classes=w?w.classes||[]:[];
  if(!histClassId&&classes.length)histClassId=classes[0].id;
  document.getElementById('class-sel-row').innerHTML=classes.map(cl=>`
    <button class="wsel${histClassId===cl.id?' on':''}" style="border-left-color:${w.color}88;font-size:11px;" onclick="histClassId=${cl.id};renderHistPage()">${cl.age||'반'} ${cl.time}</button>`).join('');

  // collect lessons for this won+class
  const entries=[];
  Object.keys(lessons).sort().reverse().forEach(k=>{
    const p=parseLkey(k);
    if(p.wonId===histWonId&&p.classId===histClassId){
      const l=lessons[k];
      if(l&&(l.topic||l.note||(l.icon&&l.icon!=='📚')))entries.push({date:p.date,l,k});
    }
  });
  const wonMemos=((memos[`${histWonId}_${histClassId}`])||[]).map(m=>({...m,isMemo:true}));
  const all=[...entries,...wonMemos].sort((a,b)=>(b.date||b.ts||'').localeCompare(a.date||a.ts||''));

  if(!all.length){document.getElementById('hist-list').innerHTML=`<div class="empty">아직 기록이 없어요 🐱<br>주간 캘린더에서 수업 후 입력해보세요</div>`;return;}
  document.getElementById('hist-list').innerHTML=all.map(item=>{
    if(item.isMemo)return `<div class="hist-item" style="border-left-color:${w?w.color:'var(--line)'}"><div class="hist-date">📌 ${item.ts}</div><div class="hist-note">${item.text}</div></div>`;
    const l=item.l,d=new Date(item.date);
    const sc=l.status||'ready';
    const done=(l.checks||[]).filter(Boolean).length;
    const total=routines[0]?routines[0].steps.length:0;
    return `<div class="hist-item" style="border-left-color:${w?w.color:'var(--line)'};cursor:pointer" onclick="openDetail('${item.k}','${parseLkey(item.k).wonId}','${parseLkey(item.k).classId}')">
      <div class="hist-date">${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]}) <span class="sbadge ${sc}">${SL[sc]}</span>${total?` <span style="font-size:10px;color:var(--muted);">루틴 ${done}/${total}</span>`:''}</div>
      <div class="hist-topic">${l.icon||'📚'} ${l.topic||'(제목 없음)'}</div>
      ${l.note?`<div class="hist-note">${l.note}</div>`:''}
      ${l.checks&&l.checks.some(Boolean)?`<div class="hist-tags">${(routines[0]?.steps||[]).filter((_,i)=>l.checks[i]).map(s=>`<span class="htag">✓ ${s.length>12?s.slice(0,12)+'…':s}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}
function addMemo(){
  const inp=document.getElementById('memo-in'),text=inp.value.trim();
  if(!text||!histWonId)return;
  const mk=`${histWonId}_${histClassId}`;
  if(!memos[mk])memos[mk]=[];
  const now=new Date();
  memos[mk].unshift({text,ts:`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`});
  inp.value='';renderHistPage();
}

/* ── NAV ── */
function nav(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bi').forEach(b=>b.classList.remove('on'));
  document.getElementById(`pg-${id}`).classList.add('on');
  const map={setup:0,weekly:1,monthly:2,stats:3,hist:4};
  document.querySelectorAll('.bi')[map[id]].classList.add('on');
  if(id==='weekly')renderWeekly();
  if(id==='monthly')renderMonthly();
  if(id==='stats')renderStats();
  if(id==='hist')renderHistPage();
}

// init
initDefaults();
</script>
</html>
